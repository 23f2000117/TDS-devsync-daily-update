name: DevSync Daily Auto Commit

on:
  schedule:
    # Runs daily at 02:30 UTC (choose any specific time)
    - cron: "30 2 * * *"
  workflow_dispatch:   # Allows manual testing

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Daily update by 23f2000117@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date -u)" >> daily-log.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "23f2000117@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update"
          git push
